<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LessonHub 선생님 로그인</title>
    <link rel="icon" type="image/png" href="/lessonhub-logo.png" />
    <link rel="apple-touch-icon" href="/lessonhub-logo.png" />
    <link rel="stylesheet" href="/lessonhub-brand.css" />
    <link rel="stylesheet" href="/lessonhub-auth.css" />
  </head>
  <body data-login-role="TEACHER">
    <main class="wrap">
      <nav class="topbar fade-up" aria-label="상단 메뉴">
        <a class="brand-lockup brand-lockup--compact" href="/index.html" aria-label="LessonHub 홈">
          <span class="lh-logo lh-logo--sm" aria-hidden="true">
            <img src="/lessonhub-logo.png" alt="" />
          </span>
          <span class="brand-lockup__text">
            <strong class="brand-lockup__name">LessonHub</strong>
            <small class="brand-lockup__sub">선생님 전용 로그인</small>
          </span>
        </a>
        <div class="top-links">
          <a href="/index.html">역할 선택</a>
          <a href="/student-login.html">학생 로그인</a>
          <a href="/guide.html">사용자 설명서</a>
        </div>
      </nav>

      <section class="panel hero-panel fade-up delay-1">
        <div class="hero-lockup">
          <span class="lh-logo lh-logo--md" aria-hidden="true">
            <img src="/lessonhub-logo.png" alt="" />
          </span>
          <div class="hero-copy">
            <h1 id="roleTitle">선생님 로그인</h1>
            <p id="loginRouteHint">로그인 후 선생님 운영 화면으로 이동합니다.</p>
          </div>
        </div>
        <div class="hero-badges">
          <span>수업 시간표 관리</span>
          <span>학생 임시계정 생성</span>
          <span>예약 승인/완료 처리</span>
        </div>
      </section>

      <section class="panel auth-layout fade-up delay-2">
        <article class="subpanel">
          <h3>로그인</h3>
          <form id="loginForm" class="grid">
            <div class="grid two">
              <label>아이디 <input name="login_id" required /></label>
              <label>비밀번호 <input name="password" type="password" required /></label>
            </div>
            <div class="actions">
              <button class="primary" type="submit">로그인</button>
              <button id="presetBtn" type="button">프리셋</button>
              <button id="healthBtn" type="button">헬스체크</button>
            </div>
          </form>

          <h3 style="margin-top: 2px">간편 로그인</h3>
          <p class="hint">Google / Naver 연동 상태를 자동 확인합니다.</p>
          <div class="actions">
            <button type="button" data-social-provider="GOOGLE">Google로 시작</button>
            <button type="button" data-social-provider="NAVER">Naver로 시작</button>
          </div>
          <p id="socialStatus" class="hint"></p>
        </article>

        <article class="subpanel">
          <h3 id="registerTitle">선생님 회원가입</h3>
          <div><span id="registerRoleBadge" class="badge">역할 고정: TEACHER</span></div>
          <form id="registerForm" class="grid">
            <div class="grid two">
              <label>아이디 <input name="login_id" placeholder="teacher01" required /></label>
              <label>휴대폰번호 <input name="phone" placeholder="01012345678" required /></label>
            </div>
            <label>이름 <input name="name" placeholder="홍길동" required /></label>
            <label>비밀번호 <input name="password" type="password" required /></label>
            <div class="grid two">
              <label>표시 이름 <input name="display_name" placeholder="Teacher Kim" /></label>
              <label>시간대
                <select name="timezone">
                  <option value="Asia/Seoul">Asia/Seoul</option>
                  <option value="UTC">UTC</option>
                </select>
              </label>
            </div>
            <div class="grid two">
              <label>기본 수업시간(분)
                <select name="lesson_duration_min">
                  <option value="30">30</option>
                  <option value="50">50</option>
                  <option value="60" selected>60</option>
                  <option value="90">90</option>
                </select>
              </label>
              <label>취소 컷오프(시간) <input name="cancel_cutoff_hours" type="number" min="0" max="336" value="6" /></label>
            </div>
            <div class="grid two">
              <label>예약 가능 기간(일) <input name="booking_window_days" type="number" min="1" max="365" value="30" /></label>
              <label>학생 취소 마감 시각(전날 시) <input name="student_cancel_day_before_hour" type="number" min="0" max="23" value="21" /></label>
            </div>
            <label>학생 공지 <textarea name="student_notice" placeholder="수업 10분 전 입장 부탁드립니다."></textarea></label>
            <label>프로필 소개 <textarea name="bio" placeholder="전문 분야, 경력, 수업 스타일"></textarea></label>
            <div class="actions">
              <button id="registerBtn" class="primary" type="submit">선생님 회원가입</button>
              <button id="logoutBtn" class="danger" type="button">로그아웃</button>
            </div>
          </form>
        </article>
      </section>

      <section class="panel fade-up delay-3" id="debugPanel">
        <div class="status" id="authStatus">로그인되지 않았습니다.</div>
        <label id="tokenBoxRow">토큰 <input id="tokenBox" class="mono" readonly /></label>
        <p class="hint" data-test-account-hint>테스트 계정: teacher@example.com / 비밀번호는 로컬에서 직접 설정</p>
        <pre id="log"></pre>
      </section>
    </main>

    <script src="/runtime-config.js"></script>
    <script src="/login-flow.js"></script>
  </body>
</html>
