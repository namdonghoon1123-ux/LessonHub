<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LessonHub — 페이지를 찾을 수 없습니다</title>
    <link rel="icon" type="image/png" href="/lessonhub-logo.png" />
    <link rel="apple-touch-icon" href="/lessonhub-logo.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#EC6A4C" />
    <link rel="stylesheet" href="/lessonhub-brand.css" />
    <link rel="stylesheet" href="/lessonhub-auth.css" />
    <style>
      .nf-shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 32px 24px;
        text-align: center;
        gap: 24px;
        background: var(--lh-bg);
      }
      .nf-card {
        max-width: 420px;
        background: var(--lh-surface);
        border: 1px solid var(--lh-line);
        border-radius: 18px;
        padding: 36px 28px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }
      .nf-code {
        font-size: 64px;
        font-weight: 800;
        letter-spacing: -2px;
        color: var(--lh-coral-deep);
        line-height: 1;
        font-variant-numeric: tabular-nums;
      }
      .nf-title {
        margin: 0;
        font-size: 20px;
        font-weight: 800;
        letter-spacing: -0.4px;
        color: var(--lh-ink);
      }
      .nf-sub {
        margin: 0;
        font-size: 14px;
        color: var(--lh-sub);
        line-height: 1.55;
      }
      .nf-actions {
        display: flex;
        flex-direction: column;
        gap: 8px;
        margin-top: 8px;
      }
      .nf-btn {
        display: block;
        text-align: center;
        text-decoration: none;
        padding: 12px 16px;
        border-radius: 12px;
        font-weight: 700;
        font-size: 14px;
      }
      .nf-btn--primary {
        background: var(--lh-coral);
        color: #fff;
      }
      .nf-btn--secondary {
        background: var(--lh-surface);
        border: 1.5px solid var(--lh-line);
        color: var(--lh-sub);
      }
    </style>
  </head>
  <body>
    <main class="nf-shell">
      <div class="nf-card">
        <div class="nf-code">404</div>
        <h1 class="nf-title">페이지를 찾을 수 없어요</h1>
        <p class="nf-sub">요청하신 주소가 이동했거나 더 이상 존재하지 않습니다. 아래 버튼으로 홈으로 돌아가 주세요.</p>
        <div class="nf-actions">
          <a class="nf-btn nf-btn--primary" href="/index.html">홈으로</a>
          <a class="nf-btn nf-btn--secondary" href="/guide.html">사용자 설명서 보기</a>
        </div>
      </div>
    </main>
    <script src="/lessonhub-toast.js"></script>
  </body>
</html>
